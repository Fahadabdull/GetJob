<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💼</text></svg>">
    <title>GetJob | Elevate Your Career</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F6F9FC;
            --surface: #FFFFFF;
            --text-main: #0A0F24;
            --text-muted: #526077;
            --primary: #4F46E5;
            --primary-hover: #3730A3;
            --border: #E2E8F0;
            --accent-glow: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.15));
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* Eye-Catching Animated Light Intro Header */
        header {
            position: relative;
            background: #FFFFFF;
            border-bottom: 1px solid var(--border);
            padding: 120px 20px;
            text-align: center;
            overflow: hidden;
        }

        /* Smooth Moving Ambient Pastel Blobs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            z-index: 1;
            animation: floatAround 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 300px; height: 300px; background: #E0E7FF; top: -50px; left: 10%; }
        .orb-2 { width: 400px; height: 400px; background: #F3E8FF; bottom: -100px; right: 5%; animation-delay: -5s; }

        @keyframes floatAround {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.15); }
        }

        header .content {
            position: relative;
            z-index: 2;
            animation: fadeInUp 1s ease-out;
        }

        header h1 {
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        header p {
            font-size: 1.3rem;
            color: var(--text-muted);
            font-weight: 500;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Main Section Setup */
        main {
            max-width: 1140px;
            margin: -35px auto 100px auto;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        /* Premium Search Input bar */
        .search-container {
            margin-bottom: 40px;
            animation: fadeInUp 1.2s ease-out;
        }

        .search-container input {
            width: 100%;
            padding: 22px 30px;
            font-size: 1.1rem;
            color: var(--text-main);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            outline: none;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03), 0 5px 15px rgba(0, 0, 0, 0.01);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.08), 0 1px 3px rgba(0,0,0,0.02);
            transform: translateY(-2px);
        }

        /* Grid Framework & Card Animations */
        #job-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }

        /* Luxury Clean Job Cards */
        .job-card {
            background: var(--surface);
            border: 1px solid #E8EEF5;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: fadeInUp 1.4s ease-out;
        }

        .job-card:hover {
            transform: translateY(-8px);
            border-color: #CBD5E1;
            box-shadow: 0 30px 60px rgba(10, 15, 36, 0.06), 0 0 1px rgba(0,0,0,0.1);
        }

        .job-card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .company-name {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.95rem;
            background: #EEF2FF;
            padding: 4px 12px;
            border-radius: 8px;
            width: fit-content;
        }

        .job-meta {
            font-size: 0.88rem;
            color: var(--text-muted);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .job-meta span {
            background: #F8FAFC;
            border: 1px solid #EDF2F7;
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: 500;
        }

        .job-desc {
            font-size: 0.98rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tags {
            margin-top: auto;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding-top: 20px;
            border-top: 1px solid #F1F5F9;
        }

        .tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #F1F5F9;
            color: #475569;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* Interactive Action Button */
        .apply-btn {
            display: block;
            width: 100%;
            text-align: center;
            background: var(--primary);
            color: #FFFFFF;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 6px;
            transition: all 0.2s ease;
        }
        
        .apply-btn:hover { 
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.2);
        }

        .no-jobs { text-align: center; color: var(--text-muted); padding: 60px; grid-column: 1 / -1; }

        /* Smooth UI Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsiveness */
        @media (max-width: 768px) {
            header { padding: 90px 20px; }
            header h1 { font-size: 2.8rem; }
            #job-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<script src="https://pl29786596.effectivecpmnetwork.com/f7/e1/af/f7e1afb2158a0eddf328b1b4fc065de6.js"></script>

    <header>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="content">
            <h1>GetJob</h1>
            <p>Elevate Your Career. Discover opportunities that matter.</p>
        </div>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by job title, company, or keywords..." onkeyup="filterJobs()">
        </div>
        <div id="job-list"></div>
        <script async="async" data-cfasync="false" src="https://pl29786598.effectivecpmnetwork.com/e5e5f13c11dd758fdd9b736d3cd1bcb6/invoke.js"></script>
<div id="container-e5e5f13c11dd758fdd9b736d3cd1bcb6"></div>

    </main>

    <script>
        function encodeData(dataObj) {
            return btoa(encodeURIComponent(JSON.stringify(dataObj)));
        }

        function decodeData(encodedStr) {
            try {
                return JSON.parse(decodeURIComponent(atob(encodedStr)));
            } catch (e) {
                return [];
            }
        }

        let jobs = [];
        const storedData = localStorage.getItem('getjob_data');
        
        if (storedData) {
            const allJobs = decodeData(storedData);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Filter logic: Auto-purges jobs 3 days past the deadline
            jobs = allJobs.filter(job => {
                const deadlineDate = new Date(job.deadline);
                deadlineDate.setHours(0, 0, 0, 0);
                
                const purgeDate = new Date(deadlineDate);
                purgeDate.setDate(purgeDate.getDate() + 3);
                
                return today <= purgeDate;
            });

            if (jobs.length !== allJobs.length) {
                localStorage.setItem('getjob_data', encodeData(jobs));
            }
        }

        function renderJobs(jobsToRender) {
            const container = document.getElementById('job-list');
            container.innerHTML = '';

            if (jobsToRender.length === 0) {
                container.innerHTML = '<div class="no-jobs">No current open positions. Check back soon!</div>';
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            jobsToRender.slice().reverse().forEach(job => {
                const card = document.createElement('div');
                card.className = 'job-card';
                
                const tagsHTML = job.tags.split(',').map(tag => 
                    `<span class="tag">${tag.trim()}</span>`
                ).join('');

                const deadlineDate = new Date(job.deadline);
                deadlineDate.setHours(0, 0, 0, 0);
                const isExpired = today > deadlineDate;

                let actionButtonHTML = '';
                if (isExpired) {
                    // Fades out and locks button instantly if expired
                    actionButtonHTML = `
                        <span class="apply-btn" style="background: #CBD5E1; color: #64748B; opacity: 0.6; cursor: not-allowed; pointer-events: none; box-shadow: none;">
                            Closed
                        </span>`;
                } else {
                    const cleanUrl = job.applyUrl.startsWith('http') ? job.applyUrl : `https://${job.applyUrl}`;
                    actionButtonHTML = `
                        <a href="${cleanUrl}" target="_blank" rel="noopener noreferrer" class="apply-btn">Apply Now</a>`;
                }

                card.innerHTML = `
                    <h3>${job.title}</h3>
                    <div class="company-name">${job.company}</div>
                    <div class="job-meta">
                        <span>📍 ${job.location}</span>
                        <span>💼 ${job.type}</span>
                        <span>💰 ${job.salary}</span>
                        <span style="${isExpired ? 'color: #EF4444; font-weight: 600;' : ''}">⏳ Deadline: ${job.deadline}</span>
                    </div>
                    <div class="job-desc">${job.description}</div>
                    <div class="tags">${tagsHTML}</div>
                    ${actionButtonHTML}
                `;
                container.appendChild(card);
            });
        }

        function filterJobs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = jobs.filter(job => {
                const searchableText = `${job.title} ${job.company} ${job.tags} ${job.location}`.toLowerCase();
                return searchableText.includes(query);
            });
            renderJobs(filtered);
        }

        renderJobs(jobs);
    </script>
    <script src="https://pl29786597.effectivecpmnetwork.com/8e/d2/85/8ed2850b7f3777d07f60bacb2cf795e6.js"></script>

</body>
